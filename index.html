<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  
  <link rel="stylesheet" href="style.css">
  
  <link rel="icon" href="./img/check-list.png" type="image/png">
</head>

<body>
  <main>
    <div class="container">
      <div class="todo-list">
        
        <div class="title">
          <h2>Todo List</h2>
          <img src="./img/list.png" alt="List Icon">
        </div>
        
        <div class="row">
          <input type="text" id="input-task" placeholder="Enter a task">
          <button class="btn">Add</button>
        </div>
        
        <ul id="task-list">
          </ul>
        
      </div>
    </div>
  </main>
  
  <script src="./main.js"></script>
</body>

</html>
